name: Translate Documentation

on:
  push:
    branches: [main]
    paths:
      - "website/docs/**/*.md"
      - "website/blog/**/*.md"
      - "website/versioned_docs/**/*.md"

  workflow_dispatch:
    inputs:
      force_retranslate:
        description: "Force retranslate all files"
        required: false
        default: "false"
        type: boolean

env:
  NODE_VERSION: "20"

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Install AI SDK
        run: npm install @anthropic-ai/sdk openai
        working-directory: website

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed markdown files
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- "website/docs/**/*.md" "website/blog/**/*.md" "website/versioned_docs/**/*.md" | sed 's|^website/||' | tr '\n' ',')
          CHANGED_FILES=${CHANGED_FILES%,}  # Remove trailing comma
          echo "Changed files: $CHANGED_FILES"
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Translate docs
        id: translate
        run: node scripts/translate.mjs
        working-directory: website
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ENDPOINT: ${{ secrets.AI_ENDPOINT }}
          TARGET_LANG: zh-Hans
          FORCE_RETRANSLATE: ${{ inputs.force_retranslate || false }}
          TEST_FILE: ./docs/develop/switch_doc_engine.md
          TRANSLATE_FILES: ${{ steps.changed.outputs.files }}

      - name: Create Pull Request
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "feat: translate docs to ${{ env.TARGET_LANG }}"
          body: |
            Automated translation by GitHub Actions.

            Triggered by: `${{ github.event_name }}`
            Commit: `${{ github.sha }}`
          branch: translation/${{ env.TARGET_LANG }}
          base: main
          commit-message: "docs: translate to ${{ env.TARGET_LANG }}"
          labels: |
            automated
            translation
